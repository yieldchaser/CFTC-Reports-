let activeTrader = 'managed_money';

// ── Data loading ──────────────────────────────────────────────
async function loadData(){
  try{
    const r=await fetch(`data/cftc_processed.json?v=${Date.now()}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    CFTC_DATA=await r.json();
    if(!CFTC_DATA.meta||!CFTC_DATA.instruments) throw new Error('Bad JSON');
    document.getElementById('latest-report').textContent=CFTC_DATA.meta.latest_report_date;
    document.getElementById('last-updated').textContent=
      new Date(CFTC_DATA.meta.last_updated).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const instCount=Object.keys(CFTC_DATA.instruments).length;
    document.getElementById('hdr-instruments').textContent=instCount+' Instruments';
    checkStaleness();
    populateDateFilter();
    initDashboard();
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>document.getElementById('loading').style.display='none',400);
  }catch(e){
    const b=document.getElementById('error-banner');
    b.textContent='Data unavailable \u2014 '+e.message; b.style.display='block';
    document.getElementById('loading').style.display='none';
  }
}

// ── Feature 7: Staleness banner ───────────────────────────────
function checkStaleness(){
  const meta=CFTC_DATA.meta;
  const reportDate=new Date(meta.latest_report_date);
  const updatedDate=new Date(meta.last_updated);
  const daysSince=(Date.now()-reportDate)/86400000;
  const daysSinceUpdate=(Date.now()-updatedDate)/86400000;
  if(daysSince>14||daysSinceUpdate>8){
    const b=document.getElementById('stale-banner');
    b.textContent=`Data may be stale \u2014 last report: ${meta.latest_report_date} (${Math.round(daysSince)} days ago). Refresh may be needed.`;
    b.style.display='block';
  }
}

// ── Date filter ───────────────────────────────────────────────
function populateDateFilter(){
  const dates=CFTC_DATA.instruments['nat_gas_nyme']?.dates||[];
  const last=dates.at(-1)||'';
  const sel=document.getElementById('date-filter');
  const opts=[
    {l:'All history',v:''},
    {l:'Last 5 years',v:wkOffset(last,-260)},
    {l:'Last 3 years',v:wkOffset(last,-156)},
    {l:'Last 2 years',v:wkOffset(last,-104)},
    {l:'Last 1 year',v:wkOffset(last,-52)},
    {l:'Last 6 months',v:wkOffset(last,-26)},
  ];
  const years=[...new Set(dates.map(d=>d.slice(0,4)))].slice(-6);
  years.forEach(y=>opts.push({l:`Since Jan ${y}`,v:`${y}-01-01`}));
  sel.innerHTML=opts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
}
function wkOffset(iso,weeks){
  const d=new Date(iso); d.setDate(d.getDate()+weeks*7);
  return d.toISOString().slice(0,10);
}
function onDateFilterChange(){filterFromDate=document.getElementById('date-filter').value||null;redrawAll();}
function onTraderFilterChange(){activeTrader=document.getElementById('trader-filter').value;renderByInstrument();}

// ── Date filter application ───────────────────────────────────
function applyDateFilter(dates,...arrays){
  if(!filterFromDate) return{dates,arrays};
  const cutoff=new Date(filterFromDate);
  const idx=dates.findIndex(d=>new Date(d)>=cutoff);
  const s=idx===-1?0:idx;
  return{dates:dates.slice(s),arrays:arrays.map(a=>a?a.slice(s):a)};
}

// ── Formatters ────────────────────────────────────────────────
function fmt(n,dec=0){if(n==null||isNaN(n))return'\u2014';return (+n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function fmtZ(n){return n==null||isNaN(n)?'\u2014':((+n>=0?'+':'')+((+n).toFixed(2)));}
function fmtPct(n){return n==null||isNaN(n)?'\u2014':`${Math.round(+n*100)}th`;}
function fmtChg(n){return n==null||isNaN(n)?'\u2014':((+n>=0?'+':'')+fmt(n));}
function fmtPctChg(n){return n==null||isNaN(n)?'\u2014':((+n>=0?'+':'')+((+n*100).toFixed(1))+'%');}
function last(arr,n=1){return arr&&arr.length>=n?arr[arr.length-n]:null;}
function wow(arr){const v=last(arr),p=last(arr,2);return v!=null&&p!=null?v-p:null;}
function wowPct(arr){const v=last(arr),p=last(arr,2);return v!=null&&p!=null&&p!==0?(v-p)/Math.abs(p):null;}

// ── Signal labels & colours ───────────────────────────────────
function getSignalLabel(score){
  const m={3:'STRONG BULLISH SETUP',2:'BULLISH POSITIONING',1:'MILD BULLISH BIAS',0:'NEUTRAL',
    '-1':'MILD BEARISH BIAS','-2':'BEARISH POSITIONING','-3':'STRONG BEARISH SETUP'};
  return m[String(score)]||'NEUTRAL';
}
function getSignalColour(score){
  if(score>=3) return '#16a34a'; if(score===2) return '#22c55e'; if(score===1) return '#86efac';
  if(score===-1) return '#fca5a5'; if(score===-2) return '#ef4444'; if(score<=-3) return '#991b1b';
  return '#5c6b8a';
}
function scoreClass(score){const s=Math.max(-3,Math.min(3,+score||0));return s>=0?`score-${s}`:`score--${Math.abs(s)}`;}

// ── OI regime badge ───────────────────────────────────────────
function oiBadge(regime){
  if(!regime) return '';
  const cls={'Accumulation':'badge-accumulation','Distribution':'badge-distribution',
    'Long Liquidation':'badge-long-liquidation','Short Covering':'badge-short-covering','Neutral':'badge-neutral'};
  return `<span class="badge ${cls[regime]||'badge-neutral'}">${regime}</span>`;
}

// ── Colour helpers ────────────────────────────────────────────
function zColour(z){
  if(z==null||isNaN(z)) return '#1e2535';
  const v=Math.max(-2.5,Math.min(2.5,+z));
  if(v>=0){const t=v/2.5;return `hsl(${Math.round(120*t)},65%,${Math.round(25+t*20)}%)`;}
  else{const t=-v/2.5;return `hsl(0,${Math.round(60*t+10)}%,${Math.round(20+t*20)}%)`;}
}
function corrColour(c){
  if(c==null||isNaN(c)) return '#1e2535';
  const v=Math.max(-1,Math.min(1,+c));
  if(v>=0){const t=v;return `hsl(${Math.round(120*t)},55%,${Math.round(18+t*27)}%)`;}
  else{const t=-v;return `hsl(0,${Math.round(50*t+10)}%,${Math.round(16+t*24)}%)`;}
}

// ── Tooltip ───────────────────────────────────────────────────
function showTip(e,html){const t=document.getElementById('tooltip');t.innerHTML=html;t.style.display='block';posTip(e);}
function posTip(e){const t=document.getElementById('tooltip');let x=e.clientX+12,y=e.clientY-8;if(x+220>window.innerWidth)x=e.clientX-224;if(y+130>window.innerHeight)y=e.clientY-130;t.style.left=x+'px';t.style.top=y+'px';}
function hideTip(){document.getElementById('tooltip').style.display='none';}
document.addEventListener('mousemove',e=>{if(document.getElementById('tooltip').style.display==='block')posTip(e);});

// ── Tab switching (Bug 4: hide trader dropdown on non-instrument tabs) ──
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const panelId={overview:'panel-overview',instrument:'panel-instrument',three:'panel-three'}[name];
  document.getElementById(panelId).classList.add('active');
  document.getElementById('trader-wrap').style.display=name==='instrument'?'flex':'none';
  if(name==='instrument') renderByInstrument();
  if(name==='three')      renderThreeTraderGrid();
}

function redrawAll(){
