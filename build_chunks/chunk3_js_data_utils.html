let CFTC_DATA = null;
let filterFromDate = null;
let activeInstrument = 'nat_gas_nyme';
let activeTrader = 'managed_money';
let normaliseByOI = true;

let sortCol = 2, sortDir = -1;

  'hh_last_day','hh_penult_fin','hh_penult_nat_gas','hh_index_ice','hh_basis_ice'];

const INSTRUMENT_LABELS = {
  nat_gas_nyme:'Nat Gas NYME', nat_gas_ld1:'Nat Gas LD1',
  nat_gas_ice_pen:'NAT GAS ICE PEN', henry_hub_nyme:'Henry Hub NYME',
  hh_last_day:'HH Last Day Fin', hh_penult_fin:'HH Penultimate Fin',
  hh_penult_nat_gas:'HH Penultimate Nat Gas',
  hh_index_ice:'HH Index ICE', hh_basis_ice:'HH Basis ICE',

// ── Data loading ──────────────────────────────────────────────
async function loadData(){
  try{
    const r = await fetch(`data/cftc_processed.json?v=${Date.now()}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    CFTC_DATA = await r.json();
    if(!CFTC_DATA.meta||!CFTC_DATA.instruments) throw new Error('Bad JSON structure');
    document.getElementById('latest-report').textContent = CFTC_DATA.meta.latest_report_date;
    document.getElementById('last-updated').textContent =
      new Date(CFTC_DATA.meta.last_updated).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    populateDateFilter();
    initDashboard();
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>document.getElementById('loading').style.display='none',400);
  }catch(e){
    const b=document.getElementById('error-banner');
    b.textContent=`Data unavailable — ${e.message}`;
    b.style.display='block';
    document.getElementById('loading').style.display='none';
  }
}

// ── Date filter ───────────────────────────────────────────────
function populateDateFilter(){
  const dates = CFTC_DATA.instruments['nat_gas_nyme']?.dates||[];
  const last = dates.at(-1)||'';
  const sel = document.getElementById('date-filter');
  const opts=[
    {l:'All history',v:''},
    {l:'Last 5 years',v:wkOffset(last,-260)},
    {l:'Last 3 years',v:wkOffset(last,-156)},
    {l:'Last 2 years',v:wkOffset(last,-104)},
    {l:'Last 1 year', v:wkOffset(last,-52)},
    {l:'Last 6 months',v:wkOffset(last,-26)},
  ];
  const years=[...new Set(dates.map(d=>d.slice(0,4)))].slice(-6);
  years.forEach(y=>opts.push({l:`Since Jan ${y}`,v:`${y}-01-01`}));
  sel.innerHTML=opts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
}
function wkOffset(iso, weeks){
  const d=new Date(iso); d.setDate(d.getDate()+weeks*7);
  return d.toISOString().slice(0,10);
}
function onDateFilterChange(){
  filterFromDate=document.getElementById('date-filter').value||null;
  redrawAll();
}
function onTraderFilterChange(){
  activeTrader=document.getElementById('trader-filter').value;
  renderByInstrument();
}

// ── Date filter application ───────────────────────────────────
function applyDateFilter(dates,...arrays){
  if(!filterFromDate) return {dates,arrays};
  const cutoff=new Date(filterFromDate);
  const idx=dates.findIndex(d=>new Date(d)>=cutoff);
  const s=idx===-1?0:idx;
  return{dates:dates.slice(s),arrays:arrays.map(a=>a?a.slice(s):a)};
}

// ── Formatting helpers ────────────────────────────────────────
function fmt(n,dec=0){
  if(n==null||n===undefined||isNaN(n)) return '—';
  return (+n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtZ(n){ return n==null||isNaN(n)?'—':((+n>=0?'+':'')+((+n).toFixed(2))); }
function fmtPct(n){ return n==null||isNaN(n)?'—':`${Math.round(+n*100)}th`; }
function fmtChg(n){ return n==null||isNaN(n)?'—':((+n>=0?'+':'')+fmt(n)); }
function fmtPctChg(n){ return n==null||isNaN(n)?'—':((+n>=0?'+':'')+((+n*100).toFixed(1))+'%'); }
function last(arr,n=1){ return arr&&arr.length>=n?arr[arr.length-n]:null; }
function wow(arr){ const v=last(arr),p=last(arr,2); return v!=null&&p!=null?v-p:null; }
function wowPct(arr){ const v=last(arr),p=last(arr,2); return v!=null&&p!=null&&p!==0?(v-p)/Math.abs(p):null; }
function nn(v){ return v==null||isNaN(v)?null:v; }

// ── Signal / composite score ──────────────────────────────────
function getSignalLabel(score){
  const m={3:'STRONG BULLISH SETUP',2:'BULLISH POSITIONING',1:'MILD BULLISH BIAS',
           0:'NEUTRAL','-1':'MILD BEARISH BIAS','-2':'BEARISH POSITIONING','-3':'STRONG BEARISH SETUP'};
  return m[String(score)]||'NEUTRAL';
}
function getSignalColour(score){
  if(score>=3) return '#16a34a';
  if(score===2) return '#22c55e';
  if(score===1) return '#86efac';
  if(score===-1) return '#fca5a5';
  if(score===-2) return '#ef4444';
  if(score<=-3) return '#991b1b';
  return '#5c6b8a';
}
function scoreClass(score){
  const s=Math.max(-3,Math.min(3,+score||0));
  return s>=0?`score-${s}`:`score--${Math.abs(s)}`;
}

// ── Chart destroy helper ──────────────────────────────────────
function destroyCharts(ids){
  ids.forEach(id=>{
    const canvas=document.getElementById(id);
    if(!canvas) return;
    const ex=Chart.getChart(canvas);
    if(ex) ex.destroy();
  });
}
function destroyAll(){
  ALL_CHARTS.forEach(c=>{try{c.destroy();}catch(e){}});
  ALL_CHARTS.length=0;
}

// ── Tooltip ───────────────────────────────────────────────────
function showTip(e, html){
  const t=document.getElementById('tooltip');
  t.innerHTML=html; t.style.display='block'; posTip(e);
}
function posTip(e){
  const t=document.getElementById('tooltip');
  let x=e.clientX+12, y=e.clientY-8;
  if(x+220>window.innerWidth) x=e.clientX-224;
  if(y+130>window.innerHeight) y=e.clientY-130;
  t.style.left=x+'px'; t.style.top=y+'px';
}
function hideTip(){ document.getElementById('tooltip').style.display='none'; }
document.addEventListener('mousemove',e=>{
  if(document.getElementById('tooltip').style.display==='block') posTip(e);
});

// ── Z-score to heatmap colour ─────────────────────────────────
function zColour(z){
  if(z==null||isNaN(z)) return '#1e2535';
  const v=Math.max(-2.5,Math.min(2.5,+z));
  if(v>=0){ const t=v/2.5; return `hsl(${Math.round(120*t)},65%,${Math.round(25+t*20)}%)`; }
  else{ const t=-v/2.5; return `hsl(0,${Math.round(60*t+10)}%,${Math.round(20+t*20)}%)`; }
}
// Correlation colour
function corrColour(c){
  if(c==null||isNaN(c)) return '#1e2535';
  const v=Math.max(-1,Math.min(1,+c));
  if(v>=0){ const t=v; return `hsl(${Math.round(120*t)},60%,${Math.round(20+t*25)}%)`; }
  else{ const t=-v; return `hsl(0,${Math.round(50*t+10)}%,${Math.round(18+t*22)}%)`; }
}

// ── Tab switching — Bug 4 fix: hide trader-filter on non-instrument tabs ──
function switchTab(name){

  if(name==='three')      renderThreeTraderGrid();
}

function redrawAll(){

  if(active.id==='panel-three') renderThreeTraderGrid();
}
