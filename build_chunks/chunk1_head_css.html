<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CFTC Natural Gas Positioning Dashboard</title>
<meta name="description" content="Professional CFTC COT positioning dashboard — 9 Natural Gas instruments, 3 trader categories, composite signals."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#06080f;--bg2:#0d1117;--bg3:#161b27;--bg4:#1e2535;--bg5:#242d42;
  --border:#253047;--border2:#2d3a55;
  --text:#e8eaf0;--text2:#9ba8c0;--text3:#5c6b8a;
  --accent:#4f8ef7;--accent2:#3a6fd8;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a855f7;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--r2:12px;--shadow:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden}

/* ── Header ── */
header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo h1{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo p{font-size:11px;color:var(--text2);margin-top:1px}
.header-meta{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.meta-item{text-align:right}
.meta-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.meta-val{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}

/* ── Tabs ── */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto}
.tab-btn{padding:13px 18px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:var(--font)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Toolbar ── */
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar label{font-size:12px;color:var(--text2)}
select{background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;font-size:12px;font-family:var(--font);cursor:pointer;outline:none;transition:border-color .2s}
select:focus{border-color:var(--accent)}
#trader-wrap{display:flex;align-items:center;gap:8px}

/* ── Tab panels ── */
.tab-panel{display:none;padding:20px 24px;flex-direction:column;gap:16px}
.tab-panel.active{display:flex}

/* ── Section title ── */
.section-title{font-size:13px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:4px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Signal Cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.signal-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:13px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.signal-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border2)}
.signal-card.score-3 {border-left:3px solid #16a34a}
.signal-card.score-2 {border-left:3px solid #22c55e}
.signal-card.score-1 {border-left:3px solid #86efac}
.signal-card.score-0 {border-left:3px solid var(--border2)}
.signal-card.score--1{border-left:3px solid #fca5a5}
.signal-card.score--2{border-left:3px solid var(--red)}
.signal-card.score--3{border-left:3px solid #991b1b}
.card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.card-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.card-key{font-size:11px;color:var(--text3)}
.card-val{font-size:11px;font-weight:600;font-family:var(--mono)}
.card-signal{margin-top:8px;padding:3px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;display:inline-block}
.score-pill{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;margin-left:6px;vertical-align:middle}
.cot-bar-track{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:4px;position:relative}
.cot-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.wow-up{color:var(--green);font-size:10px}
.wow-dn{color:var(--red);font-size:10px}

/* ── Heatmap — CRITICAL FIX for Bug 1 ── */
.heatmap-outer{overflow-x:auto;width:100%}
.heatmap-header-row{display:grid;grid-template-columns:120px repeat(52,1fr);width:100%;min-width:800px;gap:2px;margin-bottom:2px}
.heatmap-date-lbl{font-size:8px;color:var(--text3);text-align:center;overflow:hidden;white-space:nowrap;padding-top:2px}
.heatmap-body{display:flex;flex-direction:column;gap:2px;min-width:800px}
.heatmap-row{display:grid;grid-template-columns:120px repeat(52,1fr);gap:2px;align-items:center}
.hm-row-label{font-size:10px;color:var(--text2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px}
.hm-cell{height:16px;border-radius:2px;cursor:pointer;transition:transform .1s;min-width:0}
.hm-cell:hover{transform:scale(1.5);z-index:20;position:relative}

/* ── Correlation Matrix ── */
.corr-matrix-wrap{overflow-x:auto}
.corr-matrix{display:grid;gap:2px}
.corr-row{display:flex;gap:2px;align-items:center}
.corr-row-label{font-size:9px;color:var(--text2);font-family:var(--mono);width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.corr-cell{width:44px;height:36px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:rgba(255,255,255,.8);transition:transform .1s;flex-shrink:0}
.corr-cell:hover{transform:scale(1.1);z-index:10;position:relative}

/* ── Table ── */
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.table-wrap h3{font-size:12px;font-weight:600;padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
table{width:100%;border-collapse:collapse}
th{padding:7px 9px;text-align:right;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--border);user-select:none}
th:first-child{text-align:left}
th:hover{color:var(--text)}
td{padding:7px 9px;text-align:right;font-size:11px;font-family:var(--mono);border-bottom:1px solid rgba(37,48,71,.4)}
td:first-child{text-align:left;font-family:var(--font);font-size:11px;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(79,142,247,.05);cursor:pointer}
.d-pos{color:var(--green)}
.d-neg{color:var(--red)}

/* ── Chart panels ── */
.chart-panel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;position:relative}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.chart-title{font-size:12px;font-weight:600}
.chart-sub{font-size:10px;color:var(--text3);margin-top:2px}
.chart-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:4px 7px;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--bg5);color:var(--text)}
.chart-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.leg-dot{width:9px;height:9px;border-radius:50%}
.leg-line{width:18px;height:2px;border-radius:1px}
.chart-container{position:relative}
.chart-container.h240{height:240px}
.chart-container.h200{height:200px}
.chart-container.h180{height:180px}
.no-data{color:var(--text3);text-align:center;padding:40px;font-size:12px}

/* ── Instrument pills ── */
.pill-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.pill.active,.pill:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Instrument charts layout ── */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:14px}

/* ── Three trader grid ── */
.three-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:14px}
.normalise-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.toggle-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Percentile bars ── */
.pct-bars{display:flex;flex-direction:column;gap:12px;padding:10px 4px}
.pct-bar-row{display:flex;align-items:center;gap:10px}
.pct-bar-lbl{font-size:11px;color:var(--text2);width:70px;flex-shrink:0}
.pct-bar-track{flex:1;height:18px;background:var(--bg4);border-radius:4px;position:relative;overflow:hidden}
.pct-zone-wrap{position:absolute;inset:0;display:flex}
.pct-zone-r{width:20%;background:rgba(239,68,68,.2)}
.pct-zone-m{flex:1}
.pct-zone-g{width:20%;background:rgba(34,197,94,.2)}
.pct-bar-fill{position:absolute;top:2px;bottom:2px;left:0;border-radius:3px;transition:width .5s}
.pct-bar-marker{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.7);transform:translateX(-50%)}
.pct-bar-val{font-size:11px;font-family:var(--mono);font-weight:600;width:36px;text-align:right;flex-shrink:0}

/* ── Year overlay checkboxes ── */
.year-toggles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.year-toggle{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);cursor:pointer;user-select:none}
.year-toggle input{cursor:pointer;accent-color:var(--accent)}

/* ── Tooltip ── */
#tooltip{position:fixed;pointer-events:none;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 11px;font-size:11px;line-height:1.9;z-index:9999;max-width:210px;box-shadow:var(--shadow);display:none}

/* ── Loading / Error ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .4s}
.spinner{width:38px;height:38px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-banner{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--red);padding:12px 24px;font-size:12px;text-align:center}

/* ── Responsive ── */
@media(max-width:640px){
  header,#main-content .tab-panel{padding:12px 14px}
  .tabs{padding:0 14px}
  .toolbar{padding:8px 14px}
  .inst-grid,.three-grid{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
