<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CFTC Natural Gas Positioning Dashboard</title>
<meta name="description" content="Professional CFTC COT positioning dashboard — Natural Gas instruments, 5 trader categories, composite signals."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#06080f;--bg2:#0d1117;--bg3:#161b27;--bg4:#1e2535;--bg5:#242d42;
  --border:#253047;--border2:#2d3a55;
  --text:#e8eaf0;--text2:#9ba8c0;--text3:#5c6b8a;
  --accent:#4f8ef7;--accent2:#3a6fd8;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a855f7;--cyan:#06b6d4;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--r2:12px;--shadow:0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;overflow-x:hidden}

/* === Header === */
header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo h1{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo p{font-size:11px;color:var(--text2);margin-top:1px}
.header-meta{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.meta-item{text-align:right}
.meta-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.meta-val{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}

/* === Staleness banner === */
#stale-banner{display:none;background:rgba(245,158,11,.15);border-bottom:1px solid rgba(245,158,11,.4);color:var(--amber);padding:8px 24px;font-size:11px;text-align:center}

/* === Tabs === */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto}
.tab-btn{padding:12px 16px;font-size:12px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:var(--font)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* === Toolbar === */
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.toolbar label{font-size:11px;color:var(--text2)}
select{background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);padding:5px 9px;font-size:11px;font-family:var(--font);cursor:pointer;outline:none;transition:border-color .2s}
select:focus{border-color:var(--accent)}
#trader-wrap{display:flex;align-items:center;gap:8px}

/* === Tab panels === */
.tab-panel{display:none;padding:18px 24px;flex-direction:column;gap:14px}
.tab-panel.active{display:flex}

/* === Section titles === */
.section-title{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:2px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* === Signal Cards Grid === BUG 5 FIX: auto-fill no gaps === */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.signal-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.signal-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border2)}
.signal-card.score-3 {border-left:3px solid #16a34a}
.signal-card.score-2 {border-left:3px solid #22c55e}
.signal-card.score-1 {border-left:3px solid #86efac}
.signal-card.score-0 {border-left:3px solid var(--border2)}
.signal-card.score--1{border-left:3px solid #fca5a5}
.signal-card.score--2{border-left:3px solid var(--red)}
.signal-card.score--3{border-left:3px solid #991b1b}
.card-title{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.card-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.card-key{font-size:10px;color:var(--text3)}
.card-val{font-size:10px;font-weight:600;font-family:var(--mono)}
.card-signal{margin-top:7px;padding:2px 6px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;display:inline-block}
.score-pill{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:700}
.cot-bar-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px}
.cot-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.badge{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-accumulation{background:rgba(34,197,94,.2);color:var(--green)}
.badge-distribution{background:rgba(239,68,68,.2);color:var(--red)}
.badge-long-liquidation{background:rgba(239,68,68,.15);color:#fca5a5}
.badge-short-covering{background:rgba(245,158,11,.2);color:var(--amber)}
.badge-neutral{background:rgba(92,107,138,.2);color:var(--text3)}
.high-activity{background:rgba(168,85,247,.25);color:var(--purple);font-size:8px;padding:1px 5px;border-radius:2px;font-weight:700}
.wow-up{color:var(--green);font-size:9px}
.wow-dn{color:var(--red);font-size:9px}

/* === Heatmap (Bug 1 Fix: CSS grid, all 9 rows) === */
.heatmap-outer{overflow-x:auto;width:100%}
.heatmap-header-row{display:grid;gap:2px;margin-bottom:2px}
.heatmap-body{display:flex;flex-direction:column;gap:2px}
.heatmap-row{display:grid;gap:2px;align-items:center}
.hm-row-label{font-size:9px;color:var(--text2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:4px}
.hm-cell{height:14px;border-radius:2px;cursor:pointer;transition:transform .1s;min-width:0}
.hm-cell:hover{transform:scale(1.5);z-index:20;position:relative}
.heatmap-date-lbl{font-size:7px;color:var(--text3);text-align:center;overflow:hidden;white-space:nowrap}
.hm-trader-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.hm-range-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.hm-btn{padding:3px 9px;border-radius:4px;font-size:10px;font-weight:600;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s}
.hm-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* === Correlation Matrix === */
.corr-matrix-wrap{overflow-x:auto}
.corr-row{display:flex;gap:2px;align-items:center}
.corr-row-label{font-size:8px;color:var(--text2);font-family:var(--mono);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.corr-cell{width:38px;height:32px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:rgba(255,255,255,.8);transition:transform .1s;flex-shrink:0}
.corr-cell:hover{transform:scale(1.1);z-index:10;position:relative}
.corr-period-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px}

/* === Table === */
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th{padding:6px 8px;text-align:right;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--border);user-select:none}
th:first-child{text-align:left}
th:hover{color:var(--text)}
td{padding:6px 8px;text-align:right;font-size:10px;font-family:var(--mono);border-bottom:1px solid rgba(37,48,71,.4)}
td:first-child{text-align:left;font-family:var(--font);font-size:10px;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(79,142,247,.05);cursor:pointer}
.d-pos{color:var(--green)}
.d-neg{color:var(--red)}
.mom-hi{background:rgba(168,85,247,.2);color:var(--purple);padding:1px 4px;border-radius:3px}
.mom-lo{color:var(--text3)}

/* === Chart panels === */
.chart-panel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:13px;position:relative}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.chart-title{font-size:12px;font-weight:600}
.chart-sub{font-size:9px;color:var(--text3);margin-top:2px}
.chart-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.icon-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:3px 7px;color:var(--text2);font-size:10px;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--bg5);color:var(--text)}
.chart-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.leg-line{width:16px;height:2px;border-radius:1px}
.chart-container{position:relative}
.chart-container.h240{height:240px}
.chart-container.h200{height:200px}
.chart-container.h180{height:180px}
.chart-container.h160{height:160px}
.no-data{color:var(--text3);text-align:center;padding:30px;font-size:11px}

/* === Instrument pills === */
.pill-wrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.pill.active,.pill:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* === Instrument charts layout === */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:12px}

/* === Multi-Trader grid === */
.three-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:12px}
.normalise-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toggle-btn{padding:5px 12px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* === Percentile bars (Bug 4 fix) === */
.pct-bars{display:flex;flex-direction:column;gap:10px;padding:8px 2px}
.pct-bar-block{margin-bottom:2px}
.pct-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.pct-bar-lbl{font-size:10px;color:var(--text2);width:20px;flex-shrink:0;font-weight:600}
.pct-bar-sub{font-size:8px;color:var(--text3);padding-left:28px;margin-bottom:2px}
.pct-bar-track{flex:1;height:14px;background:var(--bg4);border-radius:3px;position:relative;overflow:hidden}
.pct-zone-wrap{position:absolute;inset:0;display:flex}
.pct-zone-r{width:20%;background:rgba(239,68,68,.2)}
.pct-zone-m{flex:1}
.pct-zone-g{width:20%;background:rgba(34,197,94,.2)}
.pct-bar-fill{position:absolute;top:1px;bottom:1px;left:0;border-radius:2px;transition:width .5s}
.pct-bar-marker{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,.7);transform:translateX(-50%)}
.pct-bar-val{font-size:10px;font-family:var(--mono);font-weight:600;width:32px;text-align:right;flex-shrink:0}
.pct-divider{height:1px;background:var(--border);margin:6px 0}

/* === Seasonal year toggles === */
.year-toggles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.year-toggle{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2);cursor:pointer;user-select:none}
.year-toggle input{cursor:pointer;accent-color:var(--accent)}

/* === Tooltip === */
#tooltip{position:fixed;pointer-events:none;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;font-size:10px;line-height:1.9;z-index:9999;max-width:200px;box-shadow:var(--shadow);display:none}

/* === Loading / Error === */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity .4s}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-banner{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--red);padding:10px 24px;font-size:11px;text-align:center}

/* === Responsive === */
@media(max-width:640px){
  header,.tab-panel{padding:10px 12px}
  .tabs,.toolbar{padding:0 12px}
  .inst-grid,.three-grid{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
